name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev
      - name: Install package
        run: pip install -e ".[dev,tui]"
      - name: Run tests with coverage
        run: |
          PYTHONPATH=src python -m pytest tests/ -v \
            --ignore=tests/multinode \
            --cov \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=55
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev
      - name: Install package and mypy
        run: |
          pip install -e ".[dev,tui]"
          pip install mypy
      - name: Run mypy
        run: mypy

  load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev
      - name: Install package
        run: pip install -e ".[dev,tui]"
      - name: Run load tests
        run: PYTHONPATH=src python -m pytest tests/load/ -v -m load --timeout=120

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev
      - name: Install package and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui]"
          pip install pip-audit
      - name: Run pip-audit
        run: pip-audit

  multinode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev
      - name: Install package
        run: pip install -e ".[dev,tui]"
      - name: Run multinode federation tests
        run: PYTHONPATH=src python -m pytest tests/multinode/ -v --timeout=300

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build smoke test
        run: docker build -f Dockerfile.full -t hokora:ci-test .
